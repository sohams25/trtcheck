site_name: trtcheck
site_description: Static pre-flight checker for ONNX to TensorRT conversion
site_url: https://sohams25.github.io/trtcheck/
repo_url: https://github.com/sohams25/trtcheck
repo_name: sohams25/trtcheck
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: switch to light mode

nav:
  - Home: index.md
  - Install: install.md
  - Usage: usage.md
  - Fixers: fixers.md
  - Case studies:
      - UINT8 input: case-studies/uint8-input.md
  - Operators: operators/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

plugins:
  - search

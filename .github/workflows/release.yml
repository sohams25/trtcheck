name: release

on:
  push:
    tags:
      # Match strict semver tags only (v0.1.0). Excludes floating tags
      # like 'v0' or 'v0.4' which are moved on every release and would
      # otherwise re-trigger the publish workflow.
      - "v*.*.*"
  workflow_dispatch:

# Least privilege by default. The build job only needs to read the repo; the
# publish job overrides this with the id-token needed for PyPI trusted publishing.
permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: build sdist and wheel
        run: python -m build

      - name: check artifacts
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/trtcheck/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

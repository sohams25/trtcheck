name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "tools/build_operator_docs.py"
      - "trtcheck/data/operator_matrix.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pyyaml

      - name: regenerate operator pages
        run: python tools/build_operator_docs.py

      - name: assert no drift in committed operator pages
        run: |
          if ! git diff --quiet docs/operators/; then
            echo "::error::docs/operators/ is out of sync with operator_matrix.json. Run tools/build_operator_docs.py and commit the result."
            git --no-pager diff docs/operators/ | head -200
            exit 1
          fi

      - name: build static site
        run: mkdocs build --strict --site-dir _site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: deploy to pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - id: pages
        uses: actions/deploy-pages@v4

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img"
     aria-label="trtcheck — catch ONNX to TensorRT failures before TensorRT does">
  <title>trtcheck</title>
  <desc>Static pre-flight checker for ONNX to TensorRT conversion. A terminal
  window shows the CLI verdict CONVERSION WILL FAIL for a model whose UINT8
  input TensorRT cannot accept, alongside the five-checker pre-flight report.</desc>

  <defs>
    <!-- deep OLED wash, light source upper-left so the eye lands on the wordmark -->
    <radialGradient id="bg" cx="28%" cy="22%" r="95%">
      <stop offset="0%"  stop-color="#16223e"/>
      <stop offset="55%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#080b13"/>
    </radialGradient>
    <!-- faint engineering grid -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#1b2742"/>
    </pattern>
    <!-- thin teal underline accent for the wordmark -->
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <!-- red bloom for the verdict pill: the one memorable moment -->
    <filter id="glow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- soft elevation for the terminal window -->
    <filter id="card" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ============ backdrop ============ -->
  <rect width="1280" height="560" fill="url(#bg)"/>
  <rect width="1280" height="560" fill="url(#dots)" opacity="0.5"/>

  <!-- ============ terminal window ============ -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace">
    <rect x="80" y="64" width="1120" height="432" rx="16"
          fill="#0c1322" stroke="#1e2b48" stroke-width="1.5" filter="url(#card)"/>

    <!-- title bar -->
    <circle cx="112" cy="92" r="6.5" fill="#ed6a5e"/>
    <circle cx="134" cy="92" r="6.5" fill="#f4bf4f"/>
    <circle cx="156" cy="92" r="6.5" fill="#5fc56a"/>
    <text x="640" y="97" text-anchor="middle" font-size="14" fill="#5b6b88"
          letter-spacing="0.5">trtcheck · model.onnx → TensorRT 10.3</text>
    <line x1="80" y1="118" x2="1200" y2="118" stroke="#172139" stroke-width="1.5"/>

    <!-- divider between the report (left) and the checker stack (right) -->
    <line x1="772" y1="150" x2="772" y2="452" stroke="#141d33" stroke-width="1.5"/>

    <!-- ===== LEFT: the verdict ===== -->
    <!-- prompt -->
    <text x="120" y="170" font-size="18">
      <tspan fill="#34d399">$ </tspan><tspan fill="#8595ae">trtcheck model.onnx</tspan>
    </text>

    <!-- wordmark -->
    <text x="118" y="268" font-size="84" font-weight="700" fill="#f8fafc"
          letter-spacing="-2">trtcheck</text>
    <!-- terminal cursor (blink degrades gracefully to solid) -->
    <rect x="530" y="226" width="22" height="48" fill="#34d399" rx="2">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.55;0.95;1"
               dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- accent rule under the wordmark -->
    <rect x="120" y="286" width="300" height="3" rx="1.5" fill="url(#rule)"/>

    <!-- tagline -->
    <text x="120" y="324" font-size="20" fill="#94a6c0">catch ONNX→TensorRT failures before TensorRT does</text>

    <!-- verdict pill — the focal point -->
    <g filter="url(#glow)">
      <rect x="120" y="352" width="468" height="48" rx="24" fill="#2a1418" stroke="#ef4444" stroke-width="1.5"/>
    </g>
    <circle cx="150" cy="376" r="6" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="170" y="382" font-size="18" font-weight="700" fill="#ff6b6b" letter-spacing="0.5">CONVERSION WILL FAIL<tspan fill="#b6707a" font-weight="400"> · 1 critical</tspan></text>

    <!-- the single critical issue -->
    <rect x="120" y="430" width="96" height="27" rx="6" fill="#3a1a1e"/>
    <text x="168" y="449" text-anchor="middle" font-size="13" font-weight="700" fill="#ff7a7a" letter-spacing="0.5">CRITICAL</text>
    <text x="230" y="449" font-size="15" fill="#c7d2e3">input · UINT8 dtype not accepted by TensorRT</text>
    <text x="120" y="476" font-size="14" fill="#6a7991">→ move the UINT8→FLOAT cast into preprocessing, not the model</text>

    <!-- ===== RIGHT: the five-checker report ===== -->
    <text x="812" y="166" font-size="13" fill="#5b6b88" letter-spacing="3">PRE-FLIGHT REPORT</text>

    <!-- highlighted failing row -->
    <rect x="800" y="244" width="372" height="42" rx="9" fill="#2a1418" stroke="#3f2026" stroke-width="1"/>

    <!-- row 1: operator support -->
    <path d="M 814 207 l 6 7 l 12 -15" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="846" y="213" font-size="17" fill="#aebacf">operator support</text>
    <!-- row 2: precision — FAILS -->
    <path d="M 813 258 l 16 16 M 829 258 l -16 16" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <text x="846" y="271" font-size="17" fill="#ff8a8a" font-weight="700">precision</text>
    <text x="1156" y="271" text-anchor="end" font-size="13" fill="#b6707a">UINT8</text>
    <!-- row 3: dynamic shapes -->
    <path d="M 814 317 l 6 7 l 12 -15" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="846" y="323" font-size="17" fill="#aebacf">dynamic shapes</text>
    <!-- row 4: control flow -->
    <path d="M 814 367 l 6 7 l 12 -15" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="846" y="373" font-size="17" fill="#aebacf">control flow</text>
    <!-- row 5: graph structure -->
    <path d="M 814 417 l 6 7 l 12 -15" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="846" y="423" font-size="17" fill="#aebacf">graph structure</text>
  </g>

  <!-- ============ caption strip (outside the window) ============ -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
     font-size="14.5" fill="#64748b">
    <text x="120" y="532"><tspan fill="#ef4444" font-weight="700">exit 1</tspan><tspan>   ·   5 checkers   ·   5 auto-fixers   ·   console / json / html   ·   ~10s, no CUDA, no GPU</tspan></text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Animated terminal for trtcheck: a run on model.onnx returns CONVERSION WILL FAIL for a UINT8 input; a fix run writes fixed.onnx; a re-run returns LIKELY TO CONVERT with zero findings.">
  <title>trtcheck demo</title>
  <desc>A ten-second looping terminal session in three beats. First, trtcheck model.onnx returns a red CONVERSION WILL FAIL verdict and a one-row table describing a UINT8 graph input. Second, trtcheck --fix promotes the input to FLOAT and drops a redundant Cast, writing fixed.onnx. Third, a re-run returns a green LIKELY TO CONVERT verdict with zero critical, warning, and info findings.</desc>

  <g font-family="ui-monospace, Menlo, Consolas, monospace">

    <!-- window chrome -->
    <rect x="0.5" y="0.5" width="1199" height="479" rx="12" fill="#1b1e24" stroke="#262b32" stroke-width="1"/>
    <circle cx="28" cy="22" r="6" fill="#3a3f47"/>
    <circle cx="50" cy="22" r="6" fill="#3a3f47"/>
    <circle cx="72" cy="22" r="6" fill="#3a3f47"/>
    <text x="600" y="28" text-anchor="middle" font-size="18" fill="#6b727c">trtcheck</text>
    <rect x="1" y="44" width="1198" height="434" fill="#15171c"/>

    <!-- ============ BEAT 1: fail (visible ~0.2s-4.2s of the 10s loop) ============ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.06;0.42;0.46;1" dur="10s" repeatCount="indefinite"/>
      <text x="40" y="88" font-size="24" fill="#e7eaed"><tspan fill="#5c9aa8">$</tspan> trtcheck model.onnx</text>
      <rect x="350" y="70" width="13" height="24" fill="#5c9aa8">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <!-- report + table rise a beat after the command -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.10;0.14;0.42;0.46;1" dur="10s" repeatCount="indefinite"/>
        <rect x="40" y="104" width="316" height="40" rx="6" fill="#241618" stroke="#6e302e" stroke-width="1"/>
        <text x="58" y="131" font-size="22" font-weight="600" letter-spacing="0.5" fill="#e5544e">CONVERSION WILL FAIL</text>
        <text x="40" y="176" font-size="20" fill="#868f9b">file: model.onnx</text>
        <text x="40" y="202" font-size="20" fill="#868f9b">opset: 17 &#183; nodes: 2 &#183; 1 critical, 0 warning</text>

        <!-- one text element per column; mono char ~0.6em (20px -> 12px), so columns
             sit at 40 / 164 / 252 / 376 / 800 with >=28px gutters -->
        <text x="40"  y="236" font-size="19" letter-spacing="1" fill="#5c626b">SEVERITY</text>
        <text x="164" y="236" font-size="19" letter-spacing="1" fill="#5c626b">NODE</text>
        <text x="252" y="236" font-size="19" letter-spacing="1" fill="#5c626b">OPERATOR</text>
        <text x="376" y="236" font-size="19" letter-spacing="1" fill="#5c626b">ISSUE</text>
        <text x="800" y="236" font-size="19" letter-spacing="1" fill="#5c626b">FIX</text>
        <line x1="40" y1="248" x2="1160" y2="248" stroke="#2a2e35" stroke-width="1"/>

        <text x="40"  y="274" font-size="20" font-weight="600" fill="#e5544e">CRITICAL</text>
        <text x="164" y="274" font-size="20" fill="#cfd4da">input</text>
        <text x="252" y="274" font-size="20" fill="#cfd4da">Input</text>

        <!-- ISSUE wraps within its 396px column (<=33 chars/line) -->
        <text x="376" y="274" font-size="20" fill="#cfd4da">Input 'input' has dtype UINT8;</text>
        <text x="376" y="302" font-size="20" fill="#cfd4da">TensorRT accepts only FP32, FP16,</text>
        <text x="376" y="330" font-size="20" fill="#cfd4da">INT32, or INT8 as graph inputs.</text>

        <!-- FIX wraps within its 360px column (<=30 chars/line) -->
        <text x="800" y="274" font-size="20" fill="#9aa2ac">Move the UINT8 &#8594; FLOAT32</text>
        <text x="800" y="302" font-size="20" fill="#9aa2ac">conversion (and normalization)</text>
        <text x="800" y="330" font-size="20" fill="#9aa2ac">into your preprocessing</text>
        <text x="800" y="358" font-size="20" fill="#9aa2ac">pipeline rather than the model</text>
        <text x="800" y="386" font-size="20" fill="#9aa2ac">body.</text>
      </g>
    </g>

    <!-- ============ BEAT 2: fix (visible ~4.6s-7.2s) ============ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.50;0.72;0.74;1" dur="10s" repeatCount="indefinite"/>
      <text x="40" y="88" font-size="24" fill="#e7eaed"><tspan fill="#5c9aa8">$</tspan> trtcheck model.onnx --fix --output fixed.onnx</text>
      <rect x="724" y="70" width="13" height="24" fill="#5c9aa8">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.52;0.56;0.72;0.74;1" dur="10s" repeatCount="indefinite"/>
        <text x="40" y="146" font-size="20" fill="#cfd4da">[uint8_input] promote input 'input' from UINT8 to FLOAT and drop the</text>
        <text x="68" y="174" font-size="20" fill="#cfd4da">redundant Cast node 'cast_1'</text>
        <text x="40" y="218" font-size="20" fill="#52aa6e">1 fix(es) applied. Wrote fixed.onnx.</text>
      </g>
    </g>

    <!-- ============ BEAT 3: pass (visible ~7.8s-9.7s) ============ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.78;0.97;1" dur="10s" repeatCount="indefinite"/>
      <text x="40" y="88" font-size="24" fill="#e7eaed"><tspan fill="#5c9aa8">$</tspan> trtcheck fixed.onnx</text>
      <rect x="350" y="70" width="13" height="24" fill="#5c9aa8">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.80;0.84;0.97;1" dur="10s" repeatCount="indefinite"/>
        <rect x="40" y="110" width="272" height="40" rx="6" fill="#152018" stroke="#2f5f43" stroke-width="1"/>
        <text x="58" y="137" font-size="22" font-weight="600" letter-spacing="0.5" fill="#52aa6e">LIKELY TO CONVERT</text>
        <text x="40" y="182" font-size="20" fill="#868f9b">0 critical &#183; 0 warning &#183; 0 info</text>
      </g>
    </g>

  </g>
</svg>
